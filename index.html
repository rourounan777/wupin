```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>物品资产</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont;
  background:#f7f7f7;
  color:#111;
}

/* 顶部 */
.header{
  padding:16px;
  background:#fff;
  position:sticky;
  top:0;
  z-index:10;
  border-bottom:1px solid #eee;
}
.title{
  font-size:22px;
  font-weight:600;
}
.summary{
  margin-top:6px;
  color:#888;
  font-size:13px;
}

/* 分类横滑 */
.tabs{
  display:flex;
  overflow-x:auto;
  gap:8px;
  padding:10px 12px;
  background:#fff;
}
.tabs button{
  border:none;
  background:#f1f1f1;
  padding:6px 12px;
  border-radius:20px;
  font-size:13px;
}
.tabs .active{
  background:#000;
  color:#fff;
}

/* 网格 */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:12px;
}

/* 卡片 */
.card{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
}

.img{
  width:100%;
  aspect-ratio:1;
  background:#f0f0f0;
  display:flex;
  align-items:center;
  justify-content:center;
}
.img img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.body{
  padding:8px;
}

.name{
  font-size:12px;
  font-weight:500;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.cost{
  font-size:11px;
  color:#666;
  margin-top:2px;
}

/* 浮动按钮 */
.fab{
  position:fixed;
  right:20px;
  bottom:30px;
  width:56px;
  height:56px;
  border-radius:50%;
  background:#000;
  color:#fff;
  font-size:28px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* 弹窗 */
.mask{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
}
.sheet{
  position:absolute;
  bottom:0;
  width:100%;
  background:#fff;
  border-radius:20px 20px 0 0;
  padding:20px;
}

.input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #eee;
  border-radius:10px;
}

.btn{
  width:100%;
  padding:12px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- 顶部 -->
<div class="header">
  <div class="title">全部物品</div>
  <div class="summary" id="summary">0 件 · ¥0/天</div>
</div>

<!-- 分类 -->
<div class="tabs" id="tabs"></div>

<!-- 列表 -->
<div class="grid" id="grid"></div>

<!-- 添加按钮 -->
<div class="fab" onclick="openForm()">+</div>

<!-- 弹窗 -->
<div class="mask" id="mask">
  <div class="sheet">
    <input class="input" id="name" placeholder="名称">
    <input class="input" id="price" placeholder="价格">
    <input class="input" id="cat" placeholder="分类">
    <input type="file" id="file">
    <button class="btn" onclick="save()">保存</button>
  </div>
</div>

<script>

// ====== Bmob配置 ======
const APP_ID="ecd704dd1d7fe06136bde12f599ca2ac";
const API_KEY="9062a2dd58ec8d05b81bc6a0ef62ba15";
const API="https://api.codenow.cn/1/classes/WupinItem";
const FILE_API="https://api.codenow.cn/2/files/";

let list=[];

function headers(file=false){
  return {
    "X-Bmob-Application-Id":APP_ID,
    "X-Bmob-REST-API-Key":API_KEY,
    ...(file?{}:{"Content-Type":"application/json"})
  }
}

// ====== 日成本 ======
function daily(p){
  return (p/365).toFixed(2);
}

// ====== 获取 ======
async function fetchData(){
  const res=await fetch(API+"?order=-createdAt",{headers:headers()});
  const data=await res.json();
  list=data.results||[];
  render();
}

// ====== 渲染 ======
function render(){
  const grid=document.getElementById("grid");

  let total=0;
  list.forEach(i=> total+=Number(i.price||0));

  document.getElementById("summary").innerText=
    `${list.length} 件 · ¥${daily(total)}/天`;

  // 分类
  let cats=["全部",...new Set(list.map(i=>i.category||"未分类"))];
  document.getElementById("tabs").innerHTML=
    cats.map((c,i)=>`<button class="${i==0?'active':''}" onclick="filter('${c}',this)">${c}</button>`).join("");

  grid.innerHTML=list.map(i=>`
    <div class="card">
      <div class="img">
        ${i.photo?`<img src="${i.photo}">`:"📦"}
      </div>
      <div class="body">
        <div class="name">${i.name}</div>
        <div class="cost">¥${daily(i.price)}/天</div>
      </div>
    </div>
  `).join("");
}

// ====== 分类筛选 ======
function filter(c,btn){
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  let arr=c==="全部"?list:list.filter(i=>i.category==c);

  document.getElementById("grid").innerHTML=arr.map(i=>`
    <div class="card">
      <div class="img">${i.photo?`<img src="${i.photo}">`:"📦"}</div>
      <div class="body">
        <div class="name">${i.name}</div>
        <div class="cost">¥${daily(i.price)}/天</div>
      </div>
    </div>
  `).join("");
}

// ====== 弹窗 ======
function openForm(){
  document.getElementById("mask").style.display="block";
}

// ====== 保存 ======
async function save(){
  let name=document.getElementById("name").value;
  let price=document.getElementById("price").value;
  let cat=document.getElementById("cat").value;
  let file=document.getElementById("file").files[0];

  let photo="";

  if(file){
    let res=await fetch(FILE_API+encodeURIComponent(file.name),{
      method:"POST",
      headers:{...headers(true),"Content-Type":file.type},
      body:file
    });
    let d=await res.json();
    photo=d.url;
  }

  await fetch(API,{
    method:"POST",
    headers:headers(),
    body:JSON.stringify({
      name,
      price:Number(price),
      category:cat||"未分类",
      photo
    })
  });

  document.getElementById("mask").style.display="none";
  fetchData();
}

// ====== 启动 ======
fetchData();

</script>

</body>
</html>
```
