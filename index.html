<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<title>物品管理</title>
<style>
/* ================= UI 样式 ================= */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #f7f6f2; --surface: #ffffff; --surface2: #f2f1ed; --border: #e8e6e0;
  --text: #1a1917; --text2: #6b6860; --text3: #aeacaa; --accent: #2d2d2b;
  --blue: #3b6fff; --red: #e84040; --red-bg: #fff0f0; --r: 16px;
}
body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 100px; font-size: 15px; }
button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; transition: opacity 0.2s; }
button:active { opacity: 0.7; }
input { font-family: inherit; outline: none; }

/* 头部导航 */
.hdr { background: rgba(247,246,242,.94); backdrop-filter: blur(20px); padding: 16px 20px; position: sticky; top: 0; z-index: 30; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.hdr-title { font-size: 22px; font-weight: 600; }
.hdr-sub { font-size: 13px; color: var(--text3); margin-top: 4px; }

/* 物品网格 */
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 16px; }
.icard { background: var(--surface); border-radius: var(--r); overflow: hidden; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.04); display: flex; flex-direction: column; cursor: pointer; }
.icard-img { width: 100%; aspect-ratio: 1; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 40px; position: relative; overflow: hidden; }
.icard-img img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
.icard-body { padding: 12px; display: flex; flex-direction: column; gap: 4px; }
.icard-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.icard-cost { color: var(--blue); font-weight: 500; font-size: 14px; }
.icard-cat { font-size: 12px; color: var(--text3); }

/* 悬浮添加按钮 */
.fab { position: fixed; bottom: 30px; right: 20px; width: 56px; height: 56px; border-radius: 28px; background: var(--accent); color: #fff; font-size: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,0,0,.2); z-index: 25; }

/* 弹窗通用样式 */
.ov { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity .2s; }
.ov.show { opacity: 1; pointer-events: auto; }
.sheet { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-height: 85vh; overflow-y: auto; padding: 24px; transform: translateY(100%); transition: transform .3s; display: flex; flex-direction: column; gap: 16px; }
.ov.show .sheet { transform: translateY(0); }
.sh-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: -10px auto 16px; }

/* 表单与详情 */
.photo-zone { width: 100%; aspect-ratio: 4/3; background: var(--surface2); border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden; border: 1px dashed var(--border); cursor: pointer; }
.photo-zone img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; z-index: 2; }
.photo-zone input { position: absolute; inset: 0; opacity: 0; z-index: 3; cursor: pointer; }
.fblock { background: var(--surface2); border-radius: var(--r); padding: 0 16px; display: flex; flex-direction: column; }
.frow { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border); }
.frow:last-child { border-bottom: none; }
.flabel { color: var(--text2); font-size: 14px; width: 80px; flex-shrink: 0; }
.finput { flex: 1; text-align: right; border: none; background: none; font-size: 15px; color: var(--text); }
.btn { width: 100%; padding: 14px; border-radius: 14px; font-size: 16px; font-weight: 600; text-align: center; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-del { background: var(--red-bg); color: var(--red); }
.btn-cancel { background: var(--surface2); color: var(--text); }

/* 全局 Loading */
.loading-mask { position: fixed; inset: 0; background: rgba(255,255,255,.8); z-index: 999; display: none; flex-direction: column; align-items: center; justify-content: center; font-weight: 600; color: var(--accent); backdrop-filter: blur(5px); }
.loading-mask.show { display: flex; }
.spinner { border: 3px solid var(--border); border-top: 3px solid var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 10px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="loading-mask" id="loading">
  <div class="spinner"></div>
  <span id="loading-text">加载中...</span>
</div>

<div class="hdr">
  <div>
    <div class="hdr-title">物品管理</div>
    <div class="hdr-sub" id="hdr-sub">共 0 件物品</div>
  </div>
  <button onclick="fetchItems()" style="font-size: 20px;">🔄</button>
</div>

<div id="grid" class="grid"></div>

<button class="fab" onclick="openForm()">+</button>

<div class="ov" id="ov-form" onclick="if(event.target===this) hide('ov-form')">
  <div class="sheet">
    <div class="sh-handle"></div>
    <h3 id="form-title" style="font-size: 20px;">添加新物品</h3>
    
    <div class="photo-zone" id="photo-zone">
      <div style="font-size: 32px; margin-bottom: 8px;">📷</div>
      <div style="font-size: 13px; color: var(--text3);">点击拍照或选择相册</div>
      <input type="file" accept="image/*" id="file-inp">
      <img id="preview-img" src="" style="display:none;">
    </div>

    <div class="fblock">
      <div class="frow">
        <span class="flabel">名称</span>
        <input class="finput" id="f-name" type="text" placeholder="输入物品名称">
      </div>
      <div class="frow">
        <span class="flabel">价格 (¥)</span>
        <input class="finput" id="f-price" type="number" placeholder="0.00" inputmode="decimal">
      </div>
      <div class="frow">
        <span class="flabel">分类</span>
        <input class="finput" id="f-cat" type="text" placeholder="如: 电子、衣柜、护肤">
      </div>
    </div>

    <div style="display: flex; gap: 12px; margin-top: 8px;">
      <button class="btn btn-cancel" onclick="hide('ov-form')">取消</button>
      <button class="btn btn-primary" onclick="saveItem()">保存物品</button>
    </div>
  </div>
</div>

<div class="ov" id="ov-det" onclick="if(event.target===this) hide('ov-det')">
  <div class="sheet" id="det-body">
    </div>
</div>

<script>

// ================= Bmob 后端配置 =================
const APP_ID = "ecd704dd1d7fe06136bde12f599ca2ac";
const API_KEY = "9062a2dd58ec8d05b81bc6a0ef62ba15";
const API_BASE = "https://api.codenow.cn/1/classes/WupinItem"; 
const FILE_API = "https://api.codenow.cn/2/files/";

let currentItems = [];
let uploadFileObj = null;

// 通用 HTTP 请求头
function getHeaders(isFile = false) {
    let h = {
        "X-Bmob-Application-Id": APP_ID,
        "X-Bmob-REST-API-Key": API_KEY,
    };
    if (!isFile) h["Content-Type"] = "application/json";
    return h;
}

// ================= 网络请求与数据处理 =================

// 1. 获取物品列表
async function fetchItems() {
    showLoading("正在同步数据...");
    try {
        // 按创建时间倒序排列
        const res = await fetch(API_BASE + "?order=-createdAt", { headers: getHeaders() });
        const data = await res.json();
        currentItems = data.results || [];
        renderGrid();
    } catch (err) {
        alert("网络请求失败，请检查网络或刷新页面。");
        console.error(err);
    }
    hideLoading();
}

// 2. 保存物品 (带图片上传逻辑)
async function saveItem() {
    const name = document.getElementById("f-name").value.trim();
    const price = Number(document.getElementById("f-price").value) || 0;
    const cat = document.getElementById("f-cat").value.trim() || "未分类";

    if (!name) return alert("请填写物品名称！");

    showLoading("正在保存...");
    try {
        let photoUrl = "";
        
        // 如果用户选择了新图片，先调用 Bmob 文件上传接口
        if (uploadFileObj) {
            showLoading("正在上传图片...");
            // Bmob 要求文件名进行 URL 编码
            const safeFileName = encodeURIComponent(uploadFileObj.name || "image.jpg");
            const fileRes = await fetch(FILE_API + safeFileName, {
                method: "POST",
                headers: { ...getHeaders(true), "Content-Type": uploadFileObj.type || "image/jpeg" },
                body: uploadFileObj
            });
            const fileData = await fileRes.json();
            if (fileData.url) photoUrl = fileData.url;
        }

        // 构建存入数据库的 JSON 数据
        let payload = { name, price, category: cat };
        if (photoUrl) payload.photo = photoUrl; 

        // 插入到 WupinItem 表中
        await fetch(API_BASE, {
            method: "POST",
            headers: getHeaders(),
            body: JSON.stringify(payload)
        });

        hide("ov-form");
        fetchItems(); // 保存成功后刷新列表
    } catch (err) {
        alert("保存失败，请稍后重试！");
        console.error(err);
    }
    hideLoading();
}

// 3. 删除物品
async function deleteItem(objectId) {
    if(!confirm("确定要彻底删除这件物品吗？")) return;
    
    showLoading("正在删除...");
    try {
        await fetch(`${API_BASE}/${objectId}`, {
            method: "DELETE",
            headers: getHeaders()
        });
        hide("ov-det");
        fetchItems(); // 删除成功后刷新列表
    } catch (err) {
        alert("删除失败！");
    }
    hideLoading();
}

// ================= 界面渲染与交互 =================

// 渲染网格列表
function renderGrid() {
    document.getElementById("hdr-sub").textContent = `共 ${currentItems.length} 件物品`;
    const g = document.getElementById("grid");
    
    if(!currentItems.length) {
        g.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 0;color:var(--text3);">暂无物品数据<br>点击右下角 + 开始记录</div>`;
        return;
    }

    g.innerHTML = currentItems.map(it => `
        <div class="icard" onclick="openDet('${it.objectId}')">
            <div class="icard-img">
                ${it.photo ? `<img src="${it.photo}">` : '📦'}
            </div>
            <div class="icard-body">
                <div class="icard-name">${it.name}</div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="icard-cost">¥${it.price}</span>
                    <span class="icard-cat">${it.category || '未分类'}</span>
                </div>
            </div>
        </div>
    `).join("");
}

// 图片选择与本地预览
document.getElementById("file-inp").addEventListener("change", function(e) {
    const file = this.files[0];
    if (!file) return;
    uploadFileObj = file; 

    const reader = new FileReader();
    reader.onload = e => {
        const imgEl = document.getElementById("preview-img");
        imgEl.src = e.target.result;
        imgEl.style.display = "block";
    };
    reader.readAsDataURL(file);
});

// 打开添加表单
function openForm()
